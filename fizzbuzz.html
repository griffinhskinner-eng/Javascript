<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fizz Buzz</title>
</head>
<style> /*Style tag is CSS and it adds whitespace by checking for JS with the ID fizzbuzz and preserving the \n*/
    #fizzbuzz {
        white-space: pre-line;
    }
</style>
<body>

    <h1>FizzBuzz</h1> 

    <p id="fizzbuzz"></p> <!--This id is used to connect to javascript file--> 

    <script src =  "fizzbuzz.js" ></script> <!--fizzbuzz is logged in console--> 
</body>
</html>
