<head>

    <title>Stock Research Tool</title>
    <link rel="stylesheet" href="finance.css">
</head>

<body>

        <header>

        <div id="data">


        </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!--chart.js is a library in javascript.  we connect to that library like this so that I can include a chart in my web app-->
